<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link rel="stylesheet" href="form.css" />
  </head>

  <body>
    <div class="container">
      <form action="registration.php" method="post" class="form" enctype="multipart/form-data">
        <h1>Registration Form</h1>
        <hr>

        <label>Image</label>
        <input type="file" name="image" id="">

        <label>Full Name</label>
        <input type="text" name = "fname" placeholder="Enter full name" />

        <label>Email Address</label>
        <input type="email" name = "email" placeholder="Enter email address" />

        <select name="branch" id="">
          <option value="">Select Branch</option>
          <option value="CSE">CSE</option>
          <option value="AI">AI</option>
          <option value="DS">DS</option>
          <option value="IT">IT</option>
</select>
        <div class="row">
          <div class="col">
            <label>Phone Number</label>
            <input type="tel" name = "phone" placeholder="Enter phone number" />
          </div>

          <div class="col">
            <label>Birth Date</label>
            <input type="date" name = "date" />
          </div>
        </div>

        <label>Gender</label>

        <div class="gender">
          <label><input type="radio" name="gender" value="male" /> Male</label>

          <label><input type="radio" name="gender" value="male" /> Female</label>

          <label><input type="radio" name="gender" value="male" /> Prefer not to say</label>
        </div>

        <label>Address</label>
        <input type="text" name = "address1" placeholder="Enter street address" />

        <input type="text" name = "address2" placeholder="Enter street address line 2" />

        <div class="row">
          <div class="col">
            <select>
              <option>Country</option>
              <option>India</option>
              <option>USA</option>
            </select>
          </div>

          <div class="col">
            <input type="text" name = "city" placeholder="Enter your city" />
          </div>
        </div>

        <div class="row">
          <div class="col">
            <input type="text" placeholder="Enter your region" />
          </div>

          <div class="col">
            <input type="text" placeholder="Enter postal code" />
          </div>
        </div>

        <button type = "submit">Submit</button>
      </form>
    </div>
  </body>
</html>
